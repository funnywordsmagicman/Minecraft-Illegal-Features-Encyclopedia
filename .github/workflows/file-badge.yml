name: Generate File Last Edit Badge

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: "0 * * * *" # Optional: run every hour

jobs:
  generate-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch last commit date for file
        id: last_edit
        run: |
          FILE_PATH="main/Java/Official Java Illegal Guide.md"
          REPO="${GITHUB_REPOSITORY}"
          
          # Use GitHub API to get latest commit for the file
          LAST_COMMIT_DATE=$(curl -s \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/commits?path=$FILE_PATH&per_page=1" \
            | jq -r '.[0].commit.author.date')

          echo "Last commit date: $LAST_COMMIT_DATE"
          echo "last_commit_date=$LAST_COMMIT_DATE" >> $GITHUB_OUTPUT

      - name: Calculate time since last edit
        id: calc_time
        run: |
          LAST_DATE="${{ steps.last_edit.outputs.last_commit_date }}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Convert to seconds since epoch
          LAST_EPOCH=$(date -d "$LAST_DATE" +%s)
          NOW_EPOCH=$(date -d "$NOW" +%s)
          DIFF_SECONDS=$((NOW_EPOCH - LAST_EPOCH))
          
          # Determine message (MSG) and color (COLOR)
          if [ $DIFF_SECONDS -lt 86400 ]; then
            MSG="Updated today"
            COLOR="green"
          elif [ $DIFF_SECONDS -lt 604800 ]; then
            MSG="Updated this week"
            COLOR="yellow"
          else
            MSG="Updated earlier"
            COLOR="red"
          fi

          echo "MSG=$MSG" >> $GITHUB_OUTPUT
          echo "COLOR=$COLOR" >> $GITHUB_OUTPUT

      - name: Generate badge JSON
        run: |
          mkdir -p badge
          echo "{
            \"schemaVersion\": 1,
            \"label\": \"Last Guide Edit\",
            \"message\": \"${{ steps.calc_time.outputs.MSG }}\",
            \"color\": \"${{ steps.calc_time.outputs.COLOR }}\"
          }" > badge/file-last-edit.json

      - name: Show generated JSON
        run: cat badge/file-last-edit.json
