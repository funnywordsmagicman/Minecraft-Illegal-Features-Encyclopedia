name: Update Wiki Badge

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch non-minor, non-bot edit timestamp
        run: |
          FEED="https://mcdf.wiki.gg/api.php?action=query&list=recentchanges&rcprop=title|ids|sizes|flags|user|comment|timestamp|tags&format=json"

          JSON=$(curl -s "$FEED")

          UPDATED=$(echo "$JSON" | jq -r '.query.recentchanges[] | select((.minor // "") == "" and (.bot // false) == false) | .timestamp' | head -n 1)

          # fallback if no edits found
          if [ -z "$UPDATED" ]; then
            UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi

          NOW=$(date -u +%s)
          UPDATED_SEC=$(date -d "$UPDATED" +%s)

          DIFF=$((NOW - UPDATED_SEC))

          if [ $DIFF -lt 60 ]; then
            MSG="${DIFF}s ago"
            COLOR="brightgreen"
          elif [ $DIFF -lt 3600 ]; then
            MSG="$((DIFF/60))m ago"
            COLOR="green"
          elif [ $DIFF -lt 86400 ]; then
            MSG="$((DIFF/3600))h ago"
            COLOR="yellow"
          else
            MSG="$((DIFF/86400))d ago"
            COLOR="red"
          fi

          mkdir -p badge

          echo "{
            \"schemaVersion\": 1,
            \"label\": \"Last Major Edit\",
            \"message\": \"$MSG\",
            \"color\": \"$COLOR\"
          }" > badge/wiki-last-edit.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add badge/wiki-last-edit.json
          git commit -m "Update badge" || exit 0
          git push
